<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Tugas Linktree</title>

<style>
body {
  background: #bfbfbf;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 2%;
}

.card {
  width: 30%;
  background: #f2f2f2;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.left-icon {
  background: #fff;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

.right-icon
{
  background: #fff;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

.left-icon:hover {
  background: #ececec;
}

.right-icon:hover {
  background: #ececec;
}

.link-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f7f7f7;
  padding: 12px;
  border-radius: 12px;
}

.link-card:hover {
  background: #ececec;
  cursor: pointer;
}

.link-card img {
  width: 28px;
  height: 28px;
}

.top-bar img {
  width: 15px;
  height: 15px;
}

</style>
</head>

    </div>
